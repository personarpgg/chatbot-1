<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: sans-serif; background: transparent; padding: 4px; }
#btn {
    background: rgba(249,115,22,0.12);
    border: 1px solid rgba(249,115,22,0.4);
    color: #FB923C;
    padding: 8px 18px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.2s;
}
#btn:hover { background: rgba(249,115,22,0.28); }
#btn:disabled { opacity: 0.45; cursor: not-allowed; }
#btn.listening {
    background: rgba(239,68,68,0.18);
    border-color: rgba(239,68,68,0.6);
    color: #F87171;
    animation: pulse 1.2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
#status { font-size: 12px; color: #9CA3AF; margin-top: 5px; min-height: 16px; }
</style>
</head>
<body>
<button id="btn" onclick="toggle()">🎤 말하기</button>
<div id="status"></div>
<script>
// Streamlit 컴포넌트 통신 (isStreamlitMessage 필수)
const Streamlit = {
  setComponentValue(value) {
    window.parent.postMessage({ isStreamlitMessage: true, type: "streamlit:setComponentValue", value, dataType: "json" }, "*");
  },
  setComponentReady() {
    window.parent.postMessage({ isStreamlitMessage: true, type: "streamlit:componentReady", apiVersion: 1 }, "*");
  },
  setFrameHeight(h) {
    window.parent.postMessage({ isStreamlitMessage: true, type: "streamlit:setFrameHeight", height: h }, "*");
  }
};

const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
const btn = document.getElementById('btn');
const status = document.getElementById('status');
let rec = null, listening = false;

function init() {
    Streamlit.setFrameHeight(60);
    if (!SR) {
        status.textContent = '❌ Chrome 또는 Edge 브라우저에서 사용 가능합니다';
        btn.disabled = true;
        Streamlit.setComponentReady();
        return;
    }
    rec = new SR();
    rec.lang = 'ko-KR';
    rec.continuous = false;
    rec.interimResults = false;

    rec.onstart = () => {
        listening = true;
        btn.textContent = '⏹ 정지';
        btn.classList.add('listening');
        status.textContent = '듣고 있습니다...';
    };
    rec.onresult = (e) => {
        const text = e.results[0][0].transcript;
        status.textContent = '✅ ' + text;
        Streamlit.setComponentValue(text);
    };
    rec.onerror = (e) => {
        status.textContent = '오류: ' + e.error;
        reset();
    };
    rec.onend = () => reset();
    Streamlit.setComponentReady();
}

function reset() {
    listening = false;
    btn.textContent = '🎤 말하기';
    btn.classList.remove('listening');
}

function toggle() {
    if (!rec) return;
    listening ? rec.stop() : rec.start();
}

init();
</script>
</body>
</html>
